<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nova+Cut&display=swap" rel="stylesheet">
    <title>Libros~Liberio</title>
</head>
<body>
        <button id="showBook">Show Books</button>
        <button command="show-modal" commandfor="suggestBook">New Book</button>
    <div class="library">
        

    </div>

    <dialog id="suggestBook">
        <form method="post">
            <label for="title">Title:</label>
            <input type="text" id="title" name="title"  placeholder="Beowulf" required>  

            <label for="author">Author:</label>
            <input type="text" id="author" name="author" placeholder="Anonymous" required>
            
            <label for="year">Year:</label>
            <input type="number" id="year" name="year" placeholder="975" min="-3500" max="2028" required>
            
            <label for="pages">Pages:</label>
            <input type="number" id="pages" name="pages" placeholder="255" min="1" max="100000" required>            

            <button type="submit" id="newBook">Submit</button>
        </form>
        <button commandfor="suggestBook" command="close">Nevermind</button>
    </dialog>
    <script src="jscript.js"></script>
</body>
</html>
